<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 212, 255, 0.5);
        }
        
        .status {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.active {
            background: #51cf66;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .section {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .section:hover {
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        
        .section-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }
        
        .variable {
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            border-left: 3px solid #00d4ff;
            transition: all 0.3s ease;
        }
        
        .variable:last-child {
            margin-bottom: 0;
        }
        
        .variable:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        
        .variable-label {
            font-size: 0.9em;
            color: #b0b0b0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        
        .variable-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        
        .variable-unit {
            font-size: 0.7em;
            color: #888;
            margin-left: 5px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.85em;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 30px;
        }
        
        .update-time {
            color: #00d4ff;
            font-weight: bold;
        }
        
        .no-game {
            padding: 40px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 2px dashed rgba(255, 107, 107, 0.5);
            margin: 20px 0;
        }
        
        .no-game h2 {
            color: #ff6b6b;
            margin-bottom: 10px;
        }
        
        .no-game p {
            color: #b0b0b0;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .variable-value {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ config.title }}</h1>
            <div class="status">
                <div class="status-item">
                    <span class="status-indicator" id="sessionIndicator"></span>
                    <span id="sessionText">Checking game status...</span>
                </div>
                <div class="status-item">
                    <span id="lastUpdate" class="update-time">--:--:--</span>
                </div>
            </div>
        </div>
        
        <div id="noGameWarning" class="no-game" style="display: none;">
            <h2>⚠️ Game Session Not Active</h2>
            <p>Launch Train Sim World 6 with the -HTTPAPI parameter to start receiving data</p>
        </div>
        
        <div class="dashboard" id="dashboard">
            <!-- Sections will be generated by JavaScript -->
        </div>
        
        <div class="footer">
            Last updated: <span class="update-time" id="footerTime">--:--:--</span> | 
            Dashboard may take a few seconds to load | 
            Refresh the page if data is not appearing
        </div>
    </div>
    
    <script>
        // Configuration from server
        const config = {{ config|tojson }};
        
        // State
        let latestData = {};
        let sessionActive = false;
        
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            initializeDashboard();
            startPolling();
        });
        
        function initializeDashboard() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';
            
            // Create sections from config
            config.sections.forEach(section => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'section';
                
                const title = document.createElement('div');
                title.className = 'section-title';
                title.textContent = section.name;
                sectionDiv.appendChild(title);
                
                // Add variables to section
                section.variables.forEach(varName => {
                    const varDiv = document.createElement('div');
                    varDiv.className = 'variable';
                    varDiv.id = `var-${varName}`;
                    
                    const label = document.createElement('div');
                    label.className = 'variable-label';
                    label.textContent = varName.replace(/_/g, ' ');
                    
                    const value = document.createElement('div');
                    value.className = 'variable-value';
                    value.textContent = '--';
                    
                    varDiv.appendChild(label);
                    varDiv.appendChild(value);
                    sectionDiv.appendChild(varDiv);
                });
                
                dashboard.appendChild(sectionDiv);
            });
        }
        
        function startPolling() {
            // Poll immediately
            updateData();
            
            // Then poll every 100ms (10x per second)
            setInterval(updateData, 100);
        }
        
        async function updateData() {
            try {
                const response = await fetch('/api/data');
                const result = await response.json();
                
                latestData = result.data;
                sessionActive = result.session_active;
                
                // Update UI
                updateUI(result.timestamp);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
        
        function updateUI(timestamp) {
            // Update session indicator
            const indicator = document.getElementById('sessionIndicator');
            const sessionText = document.getElementById('sessionText');
            const noGameWarning = document.getElementById('noGameWarning');
            
            if (sessionActive) {
                indicator.classList.add('active');
                sessionText.textContent = '✓ Game Session Active';
                noGameWarning.style.display = 'none';
            } else {
                indicator.classList.remove('active');
                sessionText.textContent = '✗ Waiting for Game Session';
                noGameWarning.style.display = 'block';
            }
            
            // Update timestamp
            document.getElementById('lastUpdate').textContent = timestamp;
            document.getElementById('footerTime').textContent = timestamp;
            
            // Update all variables
            config.sections.forEach(section => {
                section.variables.forEach(varName => {
                    const varElement = document.getElementById(`var-${varName}`);
                    if (varElement) {
                        const valueElement = varElement.querySelector('.variable-value');
                        const value = latestData[varName];
                        
                        if (value !== undefined && value !== null) {
                            // Format number if it's a float
                            let displayValue = value;
                            if (typeof value === 'number') {
                                // Round to 2 decimal places if it's very small
                                if (Math.abs(value) < 0.001 && value !== 0) {
                                    displayValue = value.toExponential(2);
                                } else {
                                    displayValue = value.toFixed(2);
                                }
                            }
                            valueElement.textContent = displayValue;
                        } else {
                            valueElement.textContent = '--';
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
