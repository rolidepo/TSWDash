<!DOCTYPE html>

<style>
    /* Ensure the wrapper takes up the full available screen area */
    .screen-content-wrapper {
        height: 100%;
        width: 100%;
        padding: -50px;
        margin: 0;
        box-sizing: border-box; 
    }

    /* Define the main grid layout using the specific row heights and column widths */
    .general-display-grid {
        display: grid;
        /* Columns: 20% (Col 1), 40% (Col 2), 32% (Col 3), 8% (Col 4) */
        grid-template-columns: 14% 43% 31% 12%;
        /* Rows: 50% (Row 1), 12.5% (Rows 2-5) */
        grid-template-rows: 60% 10% 10% 10% 10%;
        
        /* Outer border */
        border: 1px solid var(--current-text-color, #4f4f4f); 
    }

    /* Styling for all table cells */
    .grid-cell {
        display: flex;
        justify-content: center;
        align-items: center;
        /* Internal borders */
        border: 1px solid var(--current-text-color, #4f4f4f); 
        box-sizing: border-box;
        padding: 5px;
        color: var(--current-text-color, #f0f0f0);
        font-size: 1.1em;
        text-align: center;
        overflow: hidden; 
        
    }
    
    
    
    /* Data row styling */
    .cell-data-label {
       
        justify-content: flex-start;
        padding-left: 10px;
        font-weight: 500;
        font-size: 1em;
    }
    
    .cell-data-value {
        
        font-weight: bold;
        font-size: 1.6em;
        color: #00bcd4; /* Accent color for main data */
    }
    
    .cell-data-split-icon {
        
        font-size: 1.2em;
        color: #ff9800; /* Indicator color */
    }
    
    /* Footer styling */
    .cell-footer {
        
        font-style: italic;
        font-size: 0.9em;
    }
/* 1. Container Styling (The Track) */
#ammeter-container {
  /* Dimensions of the whole bar */
  width: 20px;          /* The width of the vertical bar */
  height: 200px;         /* The height of the vertical bar */
  
  /* Background should be transparent as requested */
  background-color: var(--ammeter-track-color); 
  border: 1px solid var(--current-screen-text-color); /* Optional: A thin border helps define the transparent track */

  /* Flexbox is used to anchor the fill bar to the bottom */
  display: flex;
  flex-direction: column-reverse; /* Stacks children bottom-up (crucial for vertical fill) */
}

/* 2. Fill Styling (The Value) */
#AMMETER\.1 {
  /* The fill bar takes the full width of the container */
  width: 100%; 
  
  /* Set the requested color for the filled area */
  background-color: var(--current-screen-text-color);
  
  /* Default height (will be set by JavaScript) */
  height: 50%; /* Example: 50% fill */
  
  /* The ID uses a period (.), so it must be escaped with a backslash (\) in CSS */
}
</style>

		/**
		 * Universal function to calculate and inject derived data fields.

		function calculateDerivedData(rawData) {
        // Create a copy of the data object to add our new fields
        const combinedData = { ...rawData };

        // --- CALCULATION LOGIC GOES HERE ---
        const rawAmps = rawData['AMMETER.1'];

        // 1. Initialize the derived variable (Crucial Fix)
        // Set it to null/undefined so getDisplayValue handles it if the calculation fails.
        combinedData['AMPS_SCALED_KILO'] = null; 

        if (typeof rawAmps === 'number' && !isNaN(rawAmps)) {
            // 2. Perform calculation only if the raw value is a valid number
            const calculatedKiloAmps = rawAmps / 100;
            
            // 3. Overwrite the initialized value with the result
            combinedData['AMPS_SCALED_KILO'] = calculatedKiloAmps;
        } 
        // --- END CALCULATION LOGIC ---

        return combinedData;
    }



        /**
         * Applies a custom conversion and formatting if defined in customConversions.
         * You can use this function to get a string ready for display.
         */
        function getDisplayValue(key, rawValue) {
            if (rawValue === null || rawValue === undefined) {
                return '--';
            }
            
            let value = rawValue;
            let fixedDecimals = 0;
            const conversion = customConversions[key];
            
            // 1. Apply Conversion Formula
            if (conversion) {
                if (typeof rawValue === 'number') {
                    // Apply the formula if available
                    value = conversion.formula(rawValue);
                }
                fixedDecimals = conversion.decimals || 0;
            } else {
                // Default formatting for non-converted numbers
                if (key.startsWith('Location_LatLon')) {
                    fixedDecimals = 2;
                } else if (typeof value === 'number') {
                    // Default to 2 decimals for smaller non-integers, otherwise 0
                    fixedDecimals = (value % 1 !== 0 && Math.abs(value) < 1000) ? 2 : 0;
                }
            }

            // 2. Apply Formatting (Handles converted and non-converted numbers)
            if (typeof value === 'number') {
                if (fixedDecimals > 0) {
                    // Fixed decimals formatting with locale for comma separation
                    return value.toLocaleString('en-US', { 
                        minimumFractionDigits: fixedDecimals, 
                        maximumFractionDigits: fixedDecimals 
                    });
                } else {
                    // Integer formatting (with commas for large numbers)
                    return Math.round(value).toLocaleString('en-US', { maximumFractionDigits: 0 });
                }
            }

            return value; // Return non-numeric/string values as is
        }

    // --- LIVE WEATHER GLOBAL STATE ---
    let weatherApiIntervalId = null;     // ID for the 5-minute API polling timer

    let isLiveWeatherActive = false;
	let isInitialWeatherApplied = false; // Tracks if the first instant patch has occurred

    let PlayerInfo4 =null; 
    // Store game values for interpolation using the new patch IDs
    const weatherPatchState = {
        // Current values (start of interpolation)
        current: { PATCH_TEMP: 0, PATCH_CLOUD: 0, PATCH_SNOW: 0, PATCH_PILE: 0, PATCH_FOG: 0, PATCH_RAIN: 0 },
        // Target values (from Open-Meteo API)
        target:  { PATCH_TEMP: 0, PATCH_CLOUD: 0, PATCH_SNOW: 0, PATCH_PILE: 0, PATCH_FOG: 0, PATCH_RAIN: 0 },
        patchStartTime: 0,
        patchDuration: 60000, // 1 minute in milliseconds

		// --- LIVE WEATHER IMPLEMENTATION ---

    /**
     * Maps Open-Meteo API values to game-compatible 0-1 values.
     * @param {string} key - The game variable ID.
     * @param {number} apiValue - The raw value from the Open-Meteo 'current' object.
     * @returns {number} The corresponding game value (float).
     */
     
    function mapApiValueToGame(key, apiValue) {
        if (typeof apiValue !== 'number') return 0;

        switch (key) {
            case 'PATCH_TEMP': 
                // Temperature is a direct value in °C
                return apiValue; 
                
            case 'PATCH_CLOUD': 
                // API: 0-100% -> Game: 0-1.0
                return Math.min(1.0, Math.max(0.0, apiValue / 100));

            case 'PATCH_SNOW': // GroundSnow
            case 'PATCH_PILE': // PiledSnow
                // API: Snowfall (cm/s). Using a max threshold of 5 cm/s = 1.0.
                const snowGameValue = Math.min(1.0, Math.max(0.0, apiValue / 5.0));
                return snowGameValue;
                
            case 'PATCH_RAIN': // Precipitation
                // API: Precipitation (mm/hr). Using a max threshold of 5 mm/hr = 1.0.
                const rainGameValue = Math.min(1.0, Math.max(0.0, apiValue / 5.0));
                return rainGameValue;

            case 'PATCH_FOG': // FogDensity from Visibility (EXPONENTIAL SCALE)
                // API: Visibility (m). Fog starts below 1000m. Max fog (1.0) at 200m.
                const visibility = apiValue;
                const visibilityMax = 10000; // New cutoff: Fog starts below 10000m
                const visibilityMin = 50; // Max fog at 600m
                
                if (visibility >= visibilityMax) return 0.0; // No fog if 10000m or higher

                // 1. Calculate the linear ratio (0 at 10000m, 1 at 600m)
                const linearRatio = (visibilityMax - visibility) / (visibilityMax - visibilityMin);
                
                // 2. Clamp the linear ratio to ensure it's between 0 and 1
                const clampedRatio = Math.min(1.0, Math.max(0.0, linearRatio));

                // 3. Apply exponential scaling (e.g., using a power of 3)
                // This makes low fog values less noticeable and high fog values more noticeable.
                const exponentialFog = Math.pow(clampedRatio, 8);

                return exponentialFog;

            default:
                console.warn(`No mapping defined for game variable: ${key}`);
                return 0;
        }
    }

    /**

     */
    async function getWeatherData() {
        if (!isLiveWeatherActive) return;

        // --- UPDATED: Use globally cached coordinates ---
        const lat = latestCoordinates.lat; 
        const lon = latestCoordinates.lon; 
        
        if (lat === 52.52 && lon === 13.41 && latestCoordinates.lat === 52.52) {
             console.warn("[WEATHER] Using default fallback coordinates. Waiting for game data to update Location_LatLon.");
        }
        // ------------------------------------

        const apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,cloud_cover,snowfall,visibility,precipitation,weather_code&timeformat=iso8601&forecast_days=1`;
        
        try {
            console.log(`[WEATHER] Fetching from: ${apiUrl}`);
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error(`HTTP Status: ${response.status}`);
            
            const apiData = await response.json();
            const current = apiData.current;
            
            if (!current) throw new Error("API response missing 'current' weather data.");
            
            const isFirstRun = !isInitialWeatherApplied;

            // Define the NEW target state based on API response
            const newTargetState = {
                PATCH_TEMP: mapApiValueToGame('PATCH_TEMP', current.temperature_2m),
                PATCH_CLOUD: mapApiValueToGame('PATCH_CLOUD', current.cloud_cover),
                PATCH_SNOW: mapApiValueToGame('PATCH_SNOW', current.snowfall), 
                PATCH_PILE: mapApiValueToGame('PATCH_PILE', current.snowfall), 
                PATCH_FOG: mapApiValueToGame('PATCH_FOG', current.visibility),
                PATCH_RAIN: mapApiValueToGame('PATCH_RAIN', current.precipitation),
            };

            // 2. Prepare for Gradual Patching
            if (isFirstRun) {
                // CRITICAL: INSTANT PATCH ON FIRST RUN
                console.log("[WEATHER] First fetch detected: Applying values instantly.");
                
                weatherPatchState.current = newTargetState;
                weatherPatchState.target = newTargetState;
                isInitialWeatherApplied = true;

                // Manually patch immediately to ensure instant application
                Object.keys(newTargetState).forEach(key => {
                    const value = newTargetState[key];
                    if (typeof window.sendPatchData === 'function') {
                        window.sendPatchData(key, value); 
                    } else {
                        console.log(`[MOCK INSTANT PATCH] ${key} set to: ${value.toFixed(3)}`);
                    }
                });
            } else {
                // Standard transition
                weatherPatchState.current = { ...weatherPatchState.target }; 
                weatherPatchState.target = newTargetState;
            }

            // Always reset the patch start time to begin/continue the 1-minute cycle
            weatherPatchState.patchStartTime = Date.now();
            console.log("[WEATHER] New targets set:", weatherPatchState.target);

            // 3. Start/Restart the Patching Interval
            if (!weatherPatchIntervalId) {
                startPatchingInterval();
            }
            
            // Update the weather status UI
            const statusElement = document.getElementById('live-weather-status');
            if (statusElement) {
                statusElement.textContent = `Status: ACTIVE (Last API: ${new Date().toLocaleTimeString()})`;
            }

        } catch (error) {
            console.error("[WEATHER] Failed to fetch or process weather data:", error);
        }
    }

    /**
     * Linearly interpolates and patches game variables over 5 minutes.
     */
    function startPatchingInterval() {
        if (weatherPatchIntervalId) clearInterval(weatherPatchIntervalId);
        
        const patchFn = () => {
            const now = Date.now();
            const elapsed = now - weatherPatchState.patchStartTime;
            const ratio = Math.min(1.0, elapsed / weatherPatchState.patchDuration); // 0.0 to 1.0

            // The variables being patched
            const gameVars = [
                'PATCH_TEMP', 
                'PATCH_CLOUD', 
                'PATCH_SNOW', 
                'PATCH_PILE', 
                'PATCH_FOG', 
                'PATCH_RAIN'
            ];

            gameVars.forEach(key => {
                const start = weatherPatchState.current[key];
                const target = weatherPatchState.target[key];
                
                // Linear interpolation (Lerp)
                let interpolatedValue = start + (target - start) * ratio;
                
                // Final value, using rounding for the 0-1 variables
                const isHighPrecisionKey = key === 'PATCH_TEMP' || key === 'PATCH_FOG';
            
				const finalValue = isHighPrecisionKey ? interpolatedValue : Math.round(interpolatedValue * 1000) / 1000;

                // Send the patch data to the server
                if (typeof window.sendPatchData === 'function') {
                    window.sendPatchData(key, finalValue);
                }
            });
        };

        // Run immediately and then set the interval
        patchFn(); 
        weatherPatchIntervalId = setInterval(patchFn, weatherPatchState.patchFrequency);
    }
    
    /**
     * Starts the main 5-minute API polling loop. (Global function)
     */
    window.startLiveWeather = () => {
        if (isLiveWeatherActive) return;
        isLiveWeatherActive = true;
        isInitialWeatherApplied = false; 
        console.log("[WEATHER] Starting Live Weather Polling (5 min interval).");
        
        getWeatherData(); 
        
        weatherApiIntervalId = setInterval(getWeatherData, 60000); //1 minute weather call

        const statusElement = document.getElementById('live-weather-status');
        if (statusElement) {
            statusElement.textContent = `Status: ACTIVE (Fetching initial data...)`;
            statusElement.style.color = 'var(--accent-color)';
        }
    };
    
    /**
     * Stops all weather-related timers. (Global function)
     */
    window.stopLiveWeather = () => {
        if (!isLiveWeatherActive) return;
        
        clearInterval(weatherApiIntervalId);
        clearInterval(weatherPatchIntervalId);
        weatherApiIntervalId = null;
        weatherPatchIntervalId = null;
        isLiveWeatherActive = false;
        isInitialWeatherApplied = false; 
		const ResetWeather = "RESET_WEATHER";
		sendPatchData(ResetWeather, 1);
        
        console.log("[WEATHER] Live Weather stopped.");

        const statusElement = document.getElementById('live-weather-status');
        if (statusElement) {
            statusElement.textContent = `Status: INACTIVE`;
            statusElement.style.color = 'var(--current-text-color)';
        }
    };

    // Attach to window just to be explicit
    window.startLiveWeather = window.startLiveWeather;
    window.stopLiveWeather = window.stopLiveWeather;
	
	function updateAmmeterValue(value) {
  const fillBar = document.getElementById('AMMETER_bar');
  const minValue = parseFloat(fillBar.getAttribute('data-min'));
  const maxValue = parseFloat(fillBar.getAttribute('data-max'));
  
  // 1. Clamp the value within the range
  const clampedValue = Math.min(Math.max(value, minValue), maxValue);
  
  // 2. Calculate the percentage fill
  const range = maxValue - minValue;
  const currentPosition = clampedValue - minValue;
  const percentage = (currentPosition / range) * 100;

  // 3. Update the height (which controls the vertical fill)
  fillBar.style.height = `${percentage}%`;
  
  // 4. Update the data attribute for reference (optional)
  fillBar.setAttribute('data-value', clampedValue);
}

// --- Usage Example ---
// Set the initial value to 300
updateAmmeterValue(300);
